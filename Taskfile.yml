version: '3'

vars:
  BINARY: tick

tasks:
  default:
    desc: Build the binary
    cmds:
      - cargo build

  release:
    desc: Tag, push, and build a release
    cmds:
      - |
        VERSION="{{.CLI_ARGS}}"
        if [ -z "$VERSION" ]; then
          echo "Usage: task release -- <version>"
          echo "  e.g. task release -- v0.1.0"
          exit 1
        fi
        git tag "$VERSION"
        git push origin "$VERSION"
        ./scripts/release.sh "$VERSION"

  clean:
    desc: Remove release artifacts
    cmds:
      - rm -rf releases/
