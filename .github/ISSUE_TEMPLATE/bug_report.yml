name: Bug report
description: Report something broken in tick
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Steps to reproduce and what you expected.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tick version
      placeholder: "v0.5.0 or cargo run output"
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output from `tick --doctor` or `tick --debug` if relevant.
