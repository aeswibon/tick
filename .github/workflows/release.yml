name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: tick-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: tick-aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: tick-x86_64-unknown-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: tick-x86_64-pc-windows-msvc.exe
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/tick" "dist/${{ matrix.asset }}"
          chmod 755 "dist/${{ matrix.asset }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/tick.exe" "dist/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: tick-*
          merge-multiple: true

      - name: Checksums
        run: |
          : > CHECKSUMS.txt
          for f in artifacts/tick-*; do
            [ -f "$f" ] || continue
            sha256sum "$f" >> CHECKSUMS.txt
          done
          cat CHECKSUMS.txt

      - name: Extract hashes
        id: hashes
        run: |
          AMD64=$(sha256sum artifacts/tick-x86_64-apple-darwin | cut -d' ' -f1)
          ARM64=$(sha256sum artifacts/tick-aarch64-apple-darwin | cut -d' ' -f1)
          LINUX=$(sha256sum artifacts/tick-x86_64-unknown-linux-gnu | cut -d' ' -f1)
          WINDOWS=$(sha256sum artifacts/tick-x86_64-pc-windows-msvc.exe | cut -d' ' -f1)
          echo "amd64=$AMD64" >> "$GITHUB_OUTPUT"
          echo "arm64=$ARM64" >> "$GITHUB_OUTPUT"
          echo "linux=$LINUX" >> "$GITHUB_OUTPUT"
          echo "windows=$WINDOWS" >> "$GITHUB_OUTPUT"

      - name: Homebrew formula
        env:
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          VERSION: ${{ github.ref_name }}
          AMD64_SHA: ${{ steps.hashes.outputs.amd64 }}
          ARM64_SHA: ${{ steps.hashes.outputs.arm64 }}
          LINUX_SHA: ${{ steps.hashes.outputs.linux }}
        run: |
          VERSION="${VERSION#v}"
          cat > tick.rb <<FORMULA
          class Tick < Formula
            desc "Jira TUI dashboard for the terminal"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${REF}/tick-aarch64-apple-darwin"
                sha256 "${ARM64_SHA}"
              else
                url "https://github.com/${REPO}/releases/download/${REF}/tick-x86_64-apple-darwin"
                sha256 "${AMD64_SHA}"
              end
            end

            on_linux do
              url "https://github.com/${REPO}/releases/download/${REF}/tick-x86_64-unknown-linux-gnu"
              sha256 "${LINUX_SHA}"
            end

            def install
              if OS.mac? && Hardware::CPU.arm?
                bin.install "tick-aarch64-apple-darwin" => "tick"
              elsif OS.mac?
                bin.install "tick-x86_64-apple-darwin" => "tick"
              else
                bin.install "tick-x86_64-unknown-linux-gnu" => "tick"
              end
            end

            test do
              assert_match "tick", shell_output("#{bin}/tick --help", 0)
            end
          end
          FORMULA

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/tick-*
            CHECKSUMS.txt
            tick.rb
          generate_release_notes: true

      - name: Update homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skip homebrew-tick bump (update Formula/tick.rb manually)"
            exit 0
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/aeswibon/homebrew-tick.git" tap
          cp tick.rb tap/Formula/tick.rb
          cd tap
          if git diff --quiet; then
            echo "homebrew-tick formula already up to date"
            exit 0
          fi
          git add Formula/tick.rb
          git commit -m "chore: bump tick to ${{ github.ref_name }}"
          git push origin main
